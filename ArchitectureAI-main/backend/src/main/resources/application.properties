spring.application.name=backend
spring.threads.virtual.enabled=true
spring.data.mongodb.uri=${MONGODB_URI}
security.jwt.secret-key=${JWT_SECRET}

# Cloudinary Config
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Python AI Review Service (ArchEval FastAPI)
# Override via AI_SERVICE_URL env var in production
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# Timeout (ms) for calls to the Python AI service — reviews can take 30-60 s
ai.service.connect-timeout=5000
ai.service.read-timeout=120000

